<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset='utf-8'>
  <meta http-equiv='X-UA-Compatible' content='IE=edge'>
  <title>ControlDesk — BMW</title>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: rgba(15,15,15,0.93);
  --border: rgba(141,198,63,0.2);
  --border-bright: rgba(141,198,63,0.6);
  --green: #8DC63F;
  --green-glow: rgba(141,198,63,0.35);
  --green-dim: rgba(141,198,63,0.15);
  --white: #ffffff;
  --white-dim: rgba(255,255,255,0.55);
  --white-faint: rgba(255,255,255,0.1);
  --open-color: #8DC63F;
  --closed-color: rgba(255,255,255,0.25);
  --danger: #ff4040;
  --wash-blue: #4fc3f7;
  --wash-blue-glow: rgba(79,195,247,0.3);
}
*{box-sizing:border-box;margin:0;padding:0}
body {
  background: var(--bg);
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
  padding-top: 10px;
  font-family: 'Rajdhani', sans-serif;
  color: var(--white);
  overflow-x: hidden;
  position: relative;
}
.bg-grid {
  position: fixed; inset: 0;
  background-image: linear-gradient(rgba(141,198,63,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(141,198,63,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none; z-index: 0;
}
.bg-glow {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse 55% 40% at 50% 55%, rgba(141,198,63,0.06) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
.main-layout {
  position: relative; z-index: 10;
  display: flex; align-items: center; gap: 18px;
}
.car-stage {
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  position: relative;
}
.showroom-bg {
  position: absolute;
  width: 580px; height: 570px;
  border-radius: 32px;
  background: #111;
  box-shadow: inset 0 0 0 1px rgba(141,198,63,0.18), 0 0 0 2px rgba(141,198,63,0.08);
  pointer-events: none; z-index: 0; overflow: hidden;
}
.showroom-bg::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 45% at 50% 52%, rgba(141,198,63,0.22) 0%, rgba(141,198,63,0.10) 38%, transparent 70%),
    radial-gradient(ellipse 30% 12% at 25% 18%, rgba(141,198,63,0.30) 0%, transparent 70%),
    radial-gradient(ellipse 30% 12% at 75% 18%, rgba(141,198,63,0.30) 0%, transparent 70%),
    radial-gradient(ellipse 18% 8% at 22% 87%, rgba(255,255,255,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 18% 8% at 78% 87%, rgba(255,255,255,0.06) 0%, transparent 70%);
}
.showroom-bg::after {
  content: ''; position: absolute; inset: 0; border-radius: 32px;
  background: repeating-linear-gradient(135deg, transparent 0px, transparent 28px, rgba(141,198,63,0.025) 28px, rgba(141,198,63,0.025) 29px);
  animation: shimmer 8s linear infinite;
}
@keyframes shimmer { 0%{background-position:0 0} 100%{background-position:80px 80px} }
.showroom-floor {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  width: 380px; height: 45px;
  background: radial-gradient(ellipse 85% 100% at 50% 100%, rgba(141,198,63,0.28) 0%, rgba(141,198,63,0.08) 60%, transparent 100%);
  pointer-events: none;
}
.car-glow-ring {
  position: absolute; width: 330px; height: 330px; border-radius: 50%;
  background: radial-gradient(circle, rgba(141,198,63,0.07) 0%, transparent 70%);
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  pointer-events: none; animation: ringPulse 4s ease-in-out infinite;
}
@keyframes ringPulse { 0%,100%{opacity:0.4;transform:translate(-50%,-50%) scale(1)} 50%{opacity:1;transform:translate(-50%,-50%) scale(1.05)} }
#car {
  position: relative; z-index: 2;
  filter: drop-shadow(0 0 22px rgba(141,198,63,0.28)) drop-shadow(0 8px 28px rgba(0,0,0,0.55)) drop-shadow(0 -2px 8px rgba(141,198,63,0.15));
  transition: filter 0.4s;
}
#car:hover { filter: drop-shadow(0 0 36px rgba(141,198,63,0.45)) drop-shadow(0 8px 28px rgba(0,0,0,0.55)); }

/* Door animations */
.g32682-toggle { transform: rotate(-40deg); transform-origin: 67px 175px; transition: transform 0.55s cubic-bezier(0.4,0,0.2,1); }
.g32696-toggle { transform: rotate(-45deg) skewY(39deg); transform-origin: 76px 132px; transition: transform 0.55s cubic-bezier(0.4,0,0.2,1); }
.g130-toggle   { transform: rotate(40deg); transform-origin: 125px 175px; transition: transform 0.55s cubic-bezier(0.4,0,0.2,1); }
.g136-toggle   { transform: rotate(45deg) skewY(-39deg); transform-origin: 119px 132px; transition: transform 0.55s cubic-bezier(0.4,0,0.2,1); }
.path32797-toggle { transform: scale(1,0.68); transform-origin: 80px 95px; transition: transform 0.55s cubic-bezier(0.4,0,0.2,1); }

.lock-btn {
  display: flex; align-items: center; gap: 9px;
  padding: 10px 22px; position: relative; z-index: 2;
  background: rgba(255,64,64,0.08); border: 1px solid rgba(255,64,64,0.45);
  border-radius: 7px; color: #ff7070;
  font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700;
  letter-spacing: 0.2em; cursor: pointer; transition: all 0.3s;
}
.lock-btn:hover { background: rgba(255,64,64,0.16); box-shadow: 0 0 16px rgba(255,64,64,0.25); }
.lock-btn.unlocked { background: var(--green-dim); border-color: rgba(141,198,63,0.55); color: var(--green); }
.lock-btn.unlocked:hover { box-shadow: 0 0 16px var(--green-glow); }

.ww-panel {
  position: relative; z-index: 10;
  margin-top: 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 18px;
  backdrop-filter: blur(16px);
  width: 100%; max-width: 580px;
}
.ww-panel::after {
  content: ''; position: absolute; top: 0; left: 24px; right: 24px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--wash-blue), var(--green), var(--wash-blue), transparent);
  opacity: 0.55;
}
.ww-title {
  font-size: 10px; letter-spacing: 0.4em; color: var(--green);
  font-family: 'Share Tech Mono', monospace; text-align: center;
  padding-bottom: 10px; border-bottom: 1px solid rgba(141,198,63,0.12);
  margin-bottom: 12px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.ww-section {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
  border-radius: 8px; padding: 10px;
  display: flex; flex-direction: column; gap: 8px;
}
.ww-sec-label {
  font-size: 8.5px; letter-spacing: 0.3em; color: var(--white-dim);
  font-family: 'Share Tech Mono', monospace; text-align: center; text-transform: uppercase;
}
.wmode-row { display: flex; gap: 4px; }
.wmode-btn {
  flex: 1; padding: 6px 4px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 5px; color: var(--white-dim);
  font-family: 'Share Tech Mono', monospace; font-size: 8px;
  letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s; text-align: center;
}
.wmode-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-dim); }
.wmode-btn.active { background: var(--green-dim); border-color: var(--green); color: var(--green); box-shadow: 0 0 8px var(--green-glow); }
.wmode-btn.active-wash { background: rgba(79,195,247,0.12); border-color: var(--wash-blue); color: var(--wash-blue); box-shadow: 0 0 8px var(--wash-blue-glow); }
.wash-btn {
  width: 100%; padding: 9px 6px;
  background: rgba(79,195,247,0.06); border: 1px solid rgba(79,195,247,0.3);
  border-radius: 6px; color: var(--wash-blue);
  font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: 0.15em; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 6px; user-select: none;
}
.wash-btn:hover { background: rgba(79,195,247,0.14); box-shadow: 0 0 12px var(--wash-blue-glow); }
.wash-btn.active-wash { background: rgba(79,195,247,0.2); box-shadow: 0 0 18px var(--wash-blue-glow); animation: washPulse 0.5s infinite; }
@keyframes washPulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
.wiper-speed-indicator {
  font-family: 'Share Tech Mono', monospace; font-size: 9px;
  color: var(--white-dim); text-align: center; letter-spacing: 0.1em; transition: color 0.3s;
}
.wiper-speed-indicator.running { color: var(--green); text-shadow: 0 0 6px var(--green-glow); }
.wiper-speed-indicator.washing { color: var(--wash-blue); text-shadow: 0 0 6px var(--wash-blue-glow); }

/* Wiper animations */
.wiper-arm { display: none; }
.wiper-arm.visible { display: block; }
@keyframes swipe-fl-slow { 0%{transform:rotate(-38deg)} 50%{transform:rotate(28deg)} 100%{transform:rotate(-38deg)} }
@keyframes swipe-fr-slow { 0%{transform:rotate(38deg)} 50%{transform:rotate(-28deg)} 100%{transform:rotate(38deg)} }
@keyframes swipe-rear    { 0%{transform:rotate(-30deg)} 50%{transform:rotate(30deg)} 100%{transform:rotate(-30deg)} }
#wiper-fl { transform-origin: 22px 111px; }
#wiper-fr { transform-origin: 47px 111px; }
#wiper-rear { transform-origin: 34px 47px; }
.wiper-slow #wiper-fl { animation: swipe-fl-slow 2.6s ease-in-out infinite; }
.wiper-slow #wiper-fr { animation: swipe-fr-slow 2.6s ease-in-out infinite; animation-delay:0.05s; }
.wiper-fast #wiper-fl { animation: swipe-fl-slow 0.85s ease-in-out infinite; }
.wiper-fast #wiper-fr { animation: swipe-fr-slow 0.85s ease-in-out infinite; animation-delay:0.04s; }
.wiper-auto #wiper-fl { animation: swipe-fl-slow 1.7s ease-in-out infinite; }
.wiper-auto #wiper-fr { animation: swipe-fr-slow 1.7s ease-in-out infinite; animation-delay:0.05s; }
.wiper-rear-on  #wiper-rear { animation: swipe-rear 2s ease-in-out infinite; }
.wiper-rear-int #wiper-rear { animation: swipe-rear 3.5s ease-in-out infinite; }

/* Internal component animations */
@keyframes motorGlow    { 0%,100%{opacity:0.75} 50%{opacity:1.0} }
@keyframes rotorSpin    { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes fluidFlow    { from{stroke-dashoffset:20} to{stroke-dashoffset:0} }
@keyframes pumpPulse    { 0%,100%{opacity:0.65} 50%{opacity:1.0} }
@keyframes impellerSpin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes bcmSigFlow   { from{stroke-dashoffset:7} to{stroke-dashoffset:0} }

#car.front-motor-active .front-motor-body { animation: motorGlow 0.7s ease-in-out infinite; }
#car.front-motor-active #front-rotor { transform-box:fill-box; transform-origin:center; animation: rotorSpin 0.35s linear infinite; }
#car.rear-motor-active  .rear-motor-body  { animation: motorGlow 0.85s ease-in-out infinite; }
#car.rear-motor-active  #rear-rotor  { transform-box:fill-box; transform-origin:center; animation: rotorSpin 0.45s linear infinite; }
#car.pump-front-active .pump-impeller { transform-box:fill-box; transform-origin:center; animation: impellerSpin 0.25s linear infinite; }
#car.pump-front-active .pump-body { animation: pumpPulse 0.3s ease-in-out infinite; }
#car.pump-rear-active  .pump-impeller { transform-box:fill-box; transform-origin:center; animation: impellerSpin 0.25s linear infinite; }
#car.pump-rear-active  .pump-body { animation: pumpPulse 0.3s ease-in-out infinite; }
#car.pump-front-active .fluid-line { stroke: rgba(79,195,247,0.95) !important; stroke-width: 0.85 !important; animation: fluidFlow 0.4s linear infinite; }
#car.pump-rear-active  .fluid-line { stroke: rgba(79,195,247,0.95) !important; stroke-width: 0.85 !important; animation: fluidFlow 0.4s linear infinite; }

.bcm-sig { fill:none; stroke:rgba(141,198,63,0.22); stroke-width:0.5; stroke-dasharray:2,1.5; }
#car.front-motor-active .bcm-sig-front { stroke:rgba(255,165,0,0.90) !important; stroke-width:0.75 !important; animation: bcmSigFlow 0.28s linear infinite !important; }
#car.rear-motor-active  .bcm-sig-rear  { stroke:rgba(255,165,0,0.90) !important; stroke-width:0.75 !important; animation: bcmSigFlow 0.32s linear infinite !important; }

@keyframes engineVibe { 0%,100%{transform:translateY(0)} 50%{transform:translateY(0.5px)} }
#car.engine-run { animation: engineVibe 0.1s linear infinite; }
#car.reverse-active { filter: drop-shadow(0 0 22px rgba(141,198,63,0.28)) drop-shadow(0 8px 28px rgba(0,0,0,0.55)) drop-shadow(0 -8px 22px rgba(255,255,255,0.6)); }

/* Correction : suppression de l'encadré gris et mise en blanc des textes cochés */
/* Aucun rectangle gris autour des composants internes — on retire les bordures/fonds indésirables */
</style>
</head>

<div class="bg-glow"></div>

<div class="main-layout">
  <div class="car-stage">
    <div class="showroom-bg"></div>
    <canvas id="rainCanvas" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;border-radius:32px;"></canvas>
    <div class="showroom-floor"></div>
    <div class="car-glow-ring"></div>

    <svg id="car" width="540" height="560" viewBox="-32 0 136 150.56797" xmlns="http://www.w3.org/2000/svg">

      <defs>
        <linearGradient id="bodyMain" x1="0%" y1="0%" x2="100%" y2="0%">

        <linearGradient id="motorBodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">

        <filter id="glowGreen" x="-30%" y="-30%" width="160%" height="160%">

          <feGaussianBlur stdDeviation="0.7" result="b"/>

        <clipPath id="frontWS-clip">
          <path d="m 76.769879,158.46897 c 15.444104,4.58634 24.144801,4.1597 39.223951,0.10487 1.87685,7.70946 4.19508,17.51444 4.19508,17.51444 l 0.4195,7.13163 c 0,0 -10.31198,4.90514 -24.436309,4.92921 -13.704819,0.0241 -24.121684,-4.71946 -24.121684,-4.71946 l 0.314632,-6.92187 c 0,0 2.56054,-9.89684 4.40483,-18.03882 z" transform="translate(-62.420581,-72.080961)"/>

      </defs>

      <g transform="translate(-62.420581,-72.080961)">

        <ellipse cx="96.3" cy="228" rx="34" ry="6.5" fill="url(#groundShadow)"/>

        <!-- Tyres -->

        <ellipse cx="68" cy="176" rx="2.2" ry="2.4" fill="#181818"/>
        <g stroke="#c0c0c0" stroke-width="0.7" opacity="0.85">
          <line x1="68" y1="170.8" x2="68" y2="173.6"/><line x1="72.8" y1="173" x2="70.7" y2="174.8"/>
          <line x1="71" y1="178.9" x2="69.3" y2="177.3"/><line x1="65" y1="178.9" x2="66.7" y2="177.3"/>

        <ellipse cx="68" cy="120" rx="2.2" ry="2.4" fill="#181818"/>
        <g stroke="#c0c0c0" stroke-width="0.7" opacity="0.85">

            stroke-dasharray="163" stroke-dashoffset="163" stroke-linecap="round"
            transform="rotate(-90 30 30)" style="transition:stroke-dashoffset 0.3s"/>
          <circle cx="30" cy="30" r="14" fill="rgba(79,195,247,0.08)" stroke="rgba(79,195,247,0.3)" stroke-width="1"/>
          <text id="pump-icon" x="30" y="35" text-anchor="middle" font-size="14" fill="#4fc3f7">💧</text>

<script>
/* ── VEHICLE SIMULATION ── */
let ignState='off',gear='P',speed=0,rpm=0,accelInt=null,brakeInt=null;
let engineNode=null,pumpNode=null,pumpInterval=null,audioCtx2=null;
function getAC2(){if(!audioCtx2)audioCtx2=new(window.AudioContext||window.webkitAudioContext)();return audioCtx2;}
function startEngine(){stopEngine();try{const ctx=getAC2(),osc=ctx.createOscillator(),osc2=ctx.createOscillator(),gain=ctx.createGain(),dist=ctx.createWaveShaper();const curve=new Float32Array(256);for(let i=0;i<256;i++){const x=(i*2/256)-1;curve[i]=x<0?-Math.pow(-x,0.6):Math.pow(x,0.6);}dist.curve=curve;osc.type='sawtooth';osc.frequency.value=55;osc2.type='square';osc2.frequency.value=110;gain.gain.value=0.06;osc.connect(dist);osc2.connect(dist);dist.connect(gain);gain.connect(ctx.destination);osc.start();osc2.start();engineNode={osc,osc2,gain,ctx};document.getElementById('car').classList.add('engine-run');}catch(e){}}
function stopEngine(){if(engineNode){try{engineNode.osc.stop();engineNode.osc2.stop();}catch(e){}engineNode=null;}document.getElementById('car').classList.remove('engine-run');}
function updateEngineSound(){if(!engineNode)return;const f=45+(rpm/8000)*160;engineNode.osc.frequency.setTargetAtTime(f,engineNode.ctx.currentTime,0.08);engineNode.osc2.frequency.setTargetAtTime(f*2,engineNode.ctx.currentTime,0.08);engineNode.gain.gain.setTargetAtTime(0.04+(rpm/8000)*0.08,engineNode.ctx.currentTime,0.08);}
function startPump(){if(pumpNode)return;try{const ctx=getAC2(),bufSize=ctx.sampleRate*0.5,buf=ctx.createBuffer(1,bufSize,ctx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<bufSize;i++)d[i]=(Math.random()*2-1)*0.08;const src=ctx.createBufferSource();src.buffer=buf;src.loop=true;const flt=ctx.createBiquadFilter();flt.type='bandpass';flt.frequency.value=2000;flt.Q.value=0.8;const g=ctx.createGain();g.gain.value=0.45;src.connect(flt);flt.connect(g);g.connect(ctx.destination);src.start();pumpNode={src,g};}catch(e){}let prog=0;const ring=document.getElementById('pump-ring'),icon=document.getElementById('pump-icon');if(icon)icon.style.animation='washPulse 0.4s infinite';if(pumpInterval)clearInterval(pumpInterval);pumpInterval=setInterval(()=>{prog=(prog+10)%164;if(ring)ring.style.strokeDashoffset=(163-prog).toString();const ind=document.getElementById('pump-ind');if(ind){ind.textContent='● PUMPING';ind.className='wiper-speed-indicator washing';}},40);}
function stopPump(){if(pumpNode){try{pumpNode.src.stop();}catch(e){}pumpNode=null;}if(pumpInterval){clearInterval(pumpInterval);pumpInterval=null;}const ring=document.getElementById('pump-ring');if(ring)ring.style.strokeDashoffset='163';const icon=document.getElementById('pump-icon');if(icon)icon.style.animation='';const ind=document.getElementById('pump-ind');if(ind){ind.textContent='● IDLE';ind.className='wiper-speed-indicator';}}
function beepIgn(freq,dur,delay=0){setTimeout(()=>{try{const ctx=getAC2(),o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=freq;g.gain.setValueAtTime(0.10,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);o.start(ctx.currentTime);o.stop(ctx.currentTime+dur);}catch(e){}},delay);}
function setIgnition(state){ignState=state;['btn-off','btn-acc','btn-on'].forEach(id=>document.getElementById(id).classList.remove('active'));const ind=document.getElementById('ign-ind');if(state==='off'){document.getElementById('btn-off').classList.add('active');ind.textContent='● OFF';ind.className='wiper-speed-indicator';stopEngine();speed=0;rpm=0;updateGauges();beepIgn(330,0.18);document.getElementById('car').classList.remove('reverse-active');}else if(state==='acc'){document.getElementById('btn-acc').classList.add('active');ind.textContent='● ACC';ind.className='wiper-speed-indicator running';stopEngine();rpm=0;updateGauges();beepIgn(500,0.09);beepIgn(660,0.12,110);}else if(state==='on'){document.getElementById('btn-on').classList.add('active');ind.textContent='● ENGINE ON';ind.className='wiper-speed-indicator running';startEngine();rpm=800;updateGauges();beepIgn(440,0.08);beepIgn(660,0.14,130);beepIgn(880,0.18,280);}}
function setGear(g){gear=g;['btn-park','btn-reverse','btn-neutral','btn-drive'].forEach(id=>document.getElementById(id).classList.remove('active'));const map={P:'btn-park',R:'btn-reverse',N:'btn-neutral',D:'btn-drive'};document.getElementById(map[g]).classList.add('active');document.getElementById('gear-ind').textContent=g;const car=document.getElementById('car');if(g==='R'){car.classList.add('reverse-active');beepIgn(880,0.08);let bc=0;const iv=setInterval(()=>{if(gear!=='R'||bc>5){clearInterval(iv);return;}beepIgn(1200,0.07);bc++;},400);}else{car.classList.remove('reverse-active');}if(g==='P'||g==='N'){speed=0;updateGauges();}}
function startAccel(){if(ignState!=='on')return;if(accelInt)return;accelInt=setInterval(()=>{if(gear==='D')speed=Math.min(200,speed+2.5);else if(gear==='R')speed=Math.min(40,speed+1.2);rpm=Math.min(7500,800+(speed/200)*6700+Math.random()*150);updateGauges();updateEngineSound();},60);}
function stopAccel(){clearInterval(accelInt);accelInt=null;}
function startBrake(){if(brakeInt)return;brakeInt=setInterval(()=>{speed=Math.max(0,speed-4);rpm=Math.max(ignState==='on'?800:0,rpm-300);updateGauges();updateEngineSound();},60);}
function stopBrake(){clearInterval(brakeInt);brakeInt=null;}
function updateGauges(){drawSpeedometer();drawRPM();const ri=document.getElementById('rpm-ind');if(ignState==='on'){ri.textContent='● '+Math.round(rpm)+' RPM';ri.className=rpm>3000?'wiper-speed-indicator washing':'wiper-speed-indicator running';}else{ri.textContent='● ENGINE OFF';ri.className='wiper-speed-indicator';}}
function drawSpeedometer(){const canvas=document.getElementById('speedCanvas');if(!canvas)return;const c=canvas.getContext('2d'),W=canvas.width,H=canvas.height;c.clearRect(0,0,W,H);const cx=W/2,cy=H*0.80,r=H*0.70,sA=Math.PI*0.85,eA=Math.PI*2.15,pct=speed/200;c.beginPath();c.arc(cx,cy,r,sA,eA);c.strokeStyle='rgba(255,255,255,0.08)';c.lineWidth=8;c.stroke();const gr=c.createLinearGradient(cx-r,cy,cx+r,cy);gr.addColorStop(0,'#8DC63F');gr.addColorStop(0.7,'#f0c040');gr.addColorStop(1,'#ff4040');c.beginPath();c.arc(cx,cy,r,sA,sA+(eA-sA)*pct);c.strokeStyle=gr;c.lineWidth=8;c.lineCap='round';c.stroke();const nA=sA+(eA-sA)*pct;c.beginPath();c.moveTo(cx,cy);c.lineTo(cx+Math.cos(nA)*(r-4),cy+Math.sin(nA)*(r-4));c.strokeStyle='#fff';c.lineWidth=2;c.lineCap='round';c.stroke();c.beginPath();c.arc(cx,cy,4,0,Math.PI*2);c.fillStyle='#8DC63F';c.fill();c.fillStyle='#fff';c.font='bold 16px Rajdhani,sans-serif';c.textAlign='center';c.fillText(Math.round(speed),cx,cy-8);c.fillStyle='rgba(255,255,255,0.4)';c.font='8px Share Tech Mono,monospace';c.fillText('km/h',cx,cy+4);}
function drawRPM(){const canvas=document.getElementById('rpmCanvas');if(!canvas)return;const c=canvas.getContext('2d'),W=canvas.width,H=canvas.height;c.clearRect(0,0,W,H);const cx=W/2,cy=H*0.88,r=H*0.72,sA=Math.PI*0.85,eA=Math.PI*2.15,pct=rpm/8000;c.beginPath();c.arc(cx,cy,r,sA,eA);c.strokeStyle='rgba(255,255,255,0.08)';c.lineWidth=6;c.stroke();const col=rpm>6000?'#ff4040':rpm>4000?'#f0c040':'#8DC63F';c.beginPath();c.arc(cx,cy,r,sA,sA+(eA-sA)*pct);c.strokeStyle=col;c.lineWidth=6;c.lineCap='round';c.stroke();const nA=sA+(eA-sA)*pct;c.beginPath();c.moveTo(cx,cy);c.lineTo(cx+Math.cos(nA)*(r-2),cy+Math.sin(nA)*(r-2));c.strokeStyle='#fff';c.lineWidth=1.5;c.lineCap='round';c.stroke();c.beginPath();c.arc(cx,cy,3,0,Math.PI*2);c.fillStyle='#8DC63F';c.fill();c.fillStyle='rgba(255,255,255,0.45)';c.font='8px Share Tech Mono,monospace';c.textAlign='center';c.fillText((rpm/1000).toFixed(1)+'k',cx,cy-5);}
</script>

<script>

<script>
/* ── WIPE & WASH ── */
let frontWiperMode='off',rearWiperMode='off',frontWashActive=false,rearWashActive=false;
let washAutoStopTimer=null,rearIntTimer=null,audioCtx=null;
const carEl=document.getElementById('car');
function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

function updateInternalVisuals(){
  carEl.classList.toggle('front-motor-active',frontWiperMode!=='off'||frontWashActive);
  carEl.classList.toggle('rear-motor-active',rearWiperMode!=='off'||rearWashActive);
  carEl.classList.toggle('pump-front-active',frontWashActive);
  carEl.classList.toggle('pump-rear-active',rearWashActive);
}

function setFrontWiper(mode){
  frontWiperMode=mode;
  document.querySelectorAll('[data-front]').forEach(b=>b.classList.remove('active'));
  document.querySelector(`[data-front="${mode}"]`).classList.add('active');
  carEl.classList.remove('wiper-slow','wiper-fast','wiper-auto');
  const fl=document.getElementById('wiper-fl'),fr=document.getElementById('wiper-fr'),ind=document.getElementById('front-wiper-ind');
  if(mode==='off'){fl.classList.remove('visible');fr.classList.remove('visible');ind.className='wiper-speed-indicator';ind.textContent='● STANDBY';playWiperBeep(false);}
  else{fl.classList.add('visible');fr.classList.add('visible');carEl.classList.add('wiper-'+mode);ind.className='wiper-speed-indicator running';const labels={slow:'◐ SLOW — 2.6s/cycle',fast:'◑ FAST — 0.85s/cycle',auto:'◒ AUTO — SPEED ADAPTIVE'};ind.textContent=labels[mode];playWiperBeep(true);}
  updateInternalVisuals();
}

function setRearWiper(mode){
  rearWiperMode=mode;
  document.querySelectorAll('[data-rear]').forEach(b=>b.classList.remove('active'));
  document.querySelector(`[data-rear="${mode}"]`).classList.add('active');
  carEl.classList.remove('wiper-rear-on','wiper-rear-int');
  const rw=document.getElementById('wiper-rear'),ind=document.getElementById('rear-wiper-ind');
  if(rearIntTimer){clearInterval(rearIntTimer);rearIntTimer=null;}
  if(mode==='off'){rw.classList.remove('visible');ind.className='wiper-speed-indicator';ind.textContent='● STANDBY';playWiperBeep(false);}
  else if(mode==='on'){rw.classList.add('visible');carEl.classList.add('wiper-rear-on');ind.className='wiper-speed-indicator running';ind.textContent='◐ ON — CONTINUOUS';playWiperBeep(true);}
  else if(mode==='int'){rw.classList.add('visible');ind.className='wiper-speed-indicator running';ind.textContent='◑ INT — INTERMITTENT';doIntermittentRear();rearIntTimer=setInterval(doIntermittentRear,4000);playWiperBeep(true);}
  updateInternalVisuals();
}
function doIntermittentRear(){const rw=document.getElementById('wiper-rear');carEl.classList.remove('wiper-rear-int');void rw.offsetWidth;carEl.classList.add('wiper-rear-int');}

function startWash(side){startPump();if(side==='front'){frontWashActive=true;document.getElementById('front-wash-btn').classList.add('active-wash');document.getElementById('front-wash-ind').className='wiper-speed-indicator washing';document.getElementById('front-wash-ind').textContent='💧 SPRAYING...';if(frontWiperMode==='off')setFrontWiper('slow');animateSpray('front');playSpraySound();}else{rearWashActive=true;document.getElementById('rear-wash-btn').classList.add('active-wash');document.getElementById('rear-wash-ind').className='wiper-speed-indicator washing';document.getElementById('rear-wash-ind').textContent='💧 SPRAYING...';if(rearWiperMode==='off')setRearWiper('on');animateSpray('rear');playSpraySound();}updateInternalVisuals();}
function stopWash(side){stopPump();if(side==='front'){frontWashActive=false;document.getElementById('front-wash-btn').classList.remove('active-wash');document.getElementById('front-wash-ind').className='wiper-speed-indicator';document.getElementById('front-wash-ind').textContent='● READY';stopSpray('front');if(frontWiperMode!=='off'){if(washAutoStopTimer)clearTimeout(washAutoStopTimer);washAutoStopTimer=setTimeout(()=>{if(!frontWashActive)setFrontWiper('off');},3000);}}else{rearWashActive=false;document.getElementById('rear-wash-btn').classList.remove('active-wash');document.getElementById('rear-wash-ind').className='wiper-speed-indicator';document.getElementById('rear-wash-ind').textContent='● READY';stopSpray('rear');setTimeout(()=>{if(!rearWashActive)setRearWiper('off');},3000);}updateInternalVisuals();}

const DROP_CONFIGS={front:{nozzles:[{x:21.6,y:85.9},{x:46.6,y:85.9}],dir:{vx:[-0.5,0.5],vy:[1.6,3.0]},gravity:0.11,groupId:'spray-front',bounds:{xMin:14,xMax:55,yMin:85,yMax:112}},rear:{nozzles:[{x:33.9,y:49.4}],dir:{vx:[-0.6,0.6],vy:[-2.8,-1.6]},gravity:0.09,groupId:'spray-rear',bounds:{xMin:14,xMax:55,yMin:20,yMax:50}}};
const particles={front:[],rear:[]};let animRunning={front:false,rear:false},rafIds={front:null,rear:null};
function spawnDrop(nozzle,cfg){const vxR=cfg.dir.vx,vyR=cfg.dir.vy;return{x:nozzle.x+(Math.random()-0.5)*1.4,y:nozzle.y,vx:vxR[0]+Math.random()*(vxR[1]-vxR[0]),vy:vyR[0]+Math.random()*(vyR[1]-vyR[0]),life:1.0,decay:0.020+Math.random()*0.016,r:0.30+Math.random()*0.60,trail:[],trailTimer:0,splat:false,splatR:0};}
function animateSpray(side){const cfg=DROP_CONFIGS[side],grp=document.getElementById(cfg.groupId);grp.setAttribute('opacity','1');animRunning[side]=true;particles[side]=[];let tick=0;function frame(){if(!animRunning[side])return;tick++;if(tick%2===0){cfg.nozzles.forEach(n=>{const count=side==='front'?3:2;for(let i=0;i<count;i++){if(particles[side].length<90)particles[side].push(spawnDrop(n,cfg));}});}particles[side].forEach(p=>{if(p.splat){p.splatR+=0.08;p.life-=0.055;}else{p.trailTimer++;if(p.trailTimer%2===0){p.trail.push({x:p.x,y:p.y});if(p.trail.length>6)p.trail.shift();}p.x+=p.vx;p.y+=p.vy;p.vy+=cfg.gravity;p.vx*=0.975;p.life-=p.decay;const b=cfg.bounds;if(p.x<b.xMin||p.x>b.xMax||p.y>b.yMax||p.y<b.yMin){p.splat=true;p.splatR=p.r*0.5;p.life=0.85;p.x=Math.max(b.xMin+0.5,Math.min(b.xMax-0.5,p.x));p.y=Math.max(b.yMin+0.5,Math.min(b.yMax-0.5,p.y));}}});particles[side]=particles[side].filter(p=>p.life>0.01);renderDrops(side,grp);rafIds[side]=requestAnimationFrame(frame);}if(rafIds[side])cancelAnimationFrame(rafIds[side]);rafIds[side]=requestAnimationFrame(frame);}
function renderDrops(side,grp){let svg='';particles[side].forEach(p=>{const op=Math.max(0,Math.min(1,p.life));if(p.splat){const r1=p.splatR,r2=p.splatR*0.55;svg+=`<ellipse cx="${p.x.toFixed(2)}" cy="${p.y.toFixed(2)}" rx="${Math.min(r1,3.5).toFixed(2)}" ry="${Math.min(r2,1.6).toFixed(2)}" fill="none" stroke="rgba(100,185,255,${(op*0.65).toFixed(2)})" stroke-width="0.22"/>`;svg+=`<circle cx="${p.x.toFixed(2)}" cy="${p.y.toFixed(2)}" r="${(p.r*0.32).toFixed(2)}" fill="rgba(200,235,255,${(op*0.70).toFixed(2)})"/>`;}else{if(p.trail.length>=2){for(let i=1;i<p.trail.length;i++){const tp=p.trail[i-1],tc=p.trail[i],tOp=(i/p.trail.length)*op*0.45,tw=(p.r*0.45*i/p.trail.length).toFixed(2);svg+=`<line x1="${tp.x.toFixed(2)}" y1="${tp.y.toFixed(2)}" x2="${tc.x.toFixed(2)}" y2="${tc.y.toFixed(2)}" stroke="rgba(90,180,255,${tOp.toFixed(2)})" stroke-width="${tw}" stroke-linecap="round"/>`;}}const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy),ang=Math.atan2(p.vy,p.vx)*180/Math.PI,rx=(p.r*(1+spd*0.15)).toFixed(2),ry=(p.r*0.62).toFixed(2);svg+=`<ellipse cx="${p.x.toFixed(2)}" cy="${p.y.toFixed(2)}" rx="${rx}" ry="${ry}" transform="rotate(${ang.toFixed(1)},${p.x.toFixed(2)},${p.y.toFixed(2)})" fill="rgba(100,190,255,${(op*0.75).toFixed(2)})"/>`;svg+=`<circle cx="${(p.x-p.r*0.3).toFixed(2)}" cy="${(p.y-p.r*0.3).toFixed(2)}" r="${(p.r*0.16).toFixed(2)}" fill="rgba(255,255,255,${op.toFixed(2)})"/>`;}});grp.innerHTML=svg;}
function stopSpray(side){animRunning[side]=false;if(rafIds[side]){cancelAnimationFrame(rafIds[side]);rafIds[side]=null;}const grp=document.getElementById(DROP_CONFIGS[side].groupId);let ff=0;function fadeOut(){ff++;particles[side].forEach(p=>{p.life-=0.07;});particles[side]=particles[side].filter(p=>p.life>0.01);renderDrops(side,grp);if(particles[side].length>0&&ff<35)requestAnimationFrame(fadeOut);else{grp.innerHTML='';grp.setAttribute('opacity','0');particles[side]=[];}}requestAnimationFrame(fadeOut);}

function playWiperBeep(isOn){try{const ctx=getAudioCtx(),osc=ctx.createOscillator(),gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.type='sine';osc.frequency.value=isOn?880:660;gain.gain.setValueAtTime(0.08,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.12);osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.12);}catch(e){}}
function playSpraySound(){try{const ctx=getAudioCtx(),bufferSize=ctx.sampleRate*0.3,buffer=ctx.createBuffer(1,bufferSize,ctx.sampleRate),data=buffer.getChannelData(0);for(let i=0;i<bufferSize;i++)data[i]=(Math.random()*2-1)*0.15;const src=ctx.createBufferSource();src.buffer=buffer;const filter=ctx.createBiquadFilter();filter.type='bandpass';filter.frequency.value=3500;filter.Q.value=0.5;const gain=ctx.createGain();gain.gain.setValueAtTime(0.6,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);src.connect(filter);filter.connect(gain);gain.connect(ctx.destination);src.start(ctx.currentTime);src.stop(ctx.currentTime+0.3);}catch(e){}}
document.addEventListener('touchstart',()=>{try{getAudioCtx().resume();}catch(e){}},{once:true});
</script>

<script>
/* ── RAIN ── */
let rainMode='off',rainRAF=null,rainDrops=[],rainAudioNode=null;
const RAIN_CFG={off:{count:0,speed:[4,8],len:[6,14],opacity:[0.3,0.6],wind:0.6},light:{count:40,speed:[3,6],len:[5,12],opacity:[0.2,0.5],wind:0.5},medium:{count:100,speed:[5,10],len:[8,18],opacity:[0.3,0.65],wind:1.0},heavy:{count:220,speed:[8,16],len:[10,24],opacity:[0.4,0.80],wind:1.8}};
function spawnRainDrop(canvas,cfg){return{x:Math.random()*canvas.width,y:Math.random()*canvas.height-canvas.height,speed:cfg.speed[0]+Math.random()*(cfg.speed[1]-cfg.speed[0]),len:cfg.len[0]+Math.random()*(cfg.len[1]-cfg.len[0]),opacity:cfg.opacity[0]+Math.random()*(cfg.opacity[1]-cfg.opacity[0]),wind:cfg.wind};}
function startRainSound(mode){stopRainSound();if(mode==='off')return;try{const ctx=getAC2(),bufSize=ctx.sampleRate*1.0,buf=ctx.createBuffer(1,bufSize,ctx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<bufSize;i++)d[i]=(Math.random()*2-1);const src=ctx.createBufferSource();src.buffer=buf;src.loop=true;const hp=ctx.createBiquadFilter();hp.type='highpass';hp.frequency.value=4000;const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=12000;const gain=ctx.createGain();gain.gain.value=mode==='light'?0.08:mode==='medium'?0.18:0.32;src.connect(hp);hp.connect(lp);lp.connect(gain);gain.connect(ctx.destination);src.start();rainAudioNode={src,gain};}catch(e){}}
function stopRainSound(){if(rainAudioNode){try{rainAudioNode.src.stop();}catch(e){}rainAudioNode=null;}}
function setRain(mode){rainMode=mode;['rain-off-btn','rain-light-btn','rain-med-btn','rain-heavy-btn'].forEach(id=>document.getElementById(id).classList.remove('active','active-wash'));const btnMap={off:'rain-off-btn',light:'rain-light-btn',medium:'rain-med-btn',heavy:'rain-heavy-btn'};document.getElementById(btnMap[mode]).classList.add(mode==='off'?'active':'active-wash');const ind=document.getElementById('rain-ind');const labels={off:'● NO RAIN',light:'● LIGHT',medium:'● MEDIUM',heavy:'● HEAVY'};ind.textContent=labels[mode];ind.className=mode==='off'?'wiper-speed-indicator':'wiper-speed-indicator washing';startRainSound(mode);if(mode==='off'){stopRainAnim();return;}startRainAnim(mode);}
function stopRainAnim(){if(rainRAF){cancelAnimationFrame(rainRAF);rainRAF=null;}rainDrops=[];const canvas=document.getElementById('rainCanvas');if(canvas)canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);}
function startRainAnim(mode){stopRainAnim();const canvas=document.getElementById('rainCanvas');if(!canvas)return;const stage=canvas.parentElement;canvas.width=stage.offsetWidth||580;canvas.height=stage.offsetHeight||570;const cfg=RAIN_CFG[mode];for(let i=0;i<cfg.count;i++){const drop=spawnRainDrop(canvas,cfg);drop.y=Math.random()*canvas.height;rainDrops.push(drop);}function frame(){const ctx2d=canvas.getContext('2d');ctx2d.clearRect(0,0,canvas.width,canvas.height);rainDrops.forEach(p=>{ctx2d.beginPath();ctx2d.moveTo(p.x,p.y);const ex=p.x+p.wind*(p.len/p.speed),ey=p.y+p.len;ctx2d.lineTo(ex,ey);const grd=ctx2d.createLinearGradient(p.x,p.y,ex,ey);grd.addColorStop(0,`rgba(180,220,255,0)`);grd.addColorStop(1,`rgba(180,220,255,${p.opacity})`);ctx2d.strokeStyle=grd;ctx2d.lineWidth=0.8+Math.random()*0.5;ctx2d.lineCap='round';ctx2d.stroke();if(p.y>canvas.height*0.88){ctx2d.beginPath();ctx2d.ellipse(p.x,p.y,1.8+Math.random(),0.6,0,0,Math.PI*2);ctx2d.fillStyle=`rgba(180,220,255,${p.opacity*0.5})`;ctx2d.fill();}p.x+=p.wind;p.y+=p.speed;if(p.y>canvas.height+20||p.x>canvas.width+20)Object.assign(p,spawnRainDrop(canvas,cfg));});while(rainDrops.length<cfg.count)rainDrops.push(spawnRainDrop(canvas,cfg));if(rainDrops.length>cfg.count+10)rainDrops.splice(cfg.count);rainRAF=requestAnimationFrame(frame);}rainRAF=requestAnimationFrame(frame);}

(function initAll(){
  const bOff=document.getElementById('btn-off');if(bOff)bOff.classList.add('active');
  const bPark=document.getElementById('btn-park');if(bPark)bPark.classList.add('active');
  const rainOffBtn=document.getElementById('rain-off-btn');if(rainOffBtn)rainOffBtn.classList.add('active');
  updateGauges();
  updateInternalVisuals();
})();
</script>
